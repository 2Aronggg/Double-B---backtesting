<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파스터디: Double-B + RSI 콤보 전략 백테스트 (V2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            height: 380px;
            max-height: 420px;
        }
        @media (max-width: 768px) { .chart-container { height: 300px; } }

        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { background-color: #3b82f6; color: #ffffff; border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .tab-btn:not(.active) { background-color: #1e293b; color: #94a3b8; border-color: #334155; }
        .tab-btn:not(.active):hover { background-color: #2dd4bf; color: #0f172a; border-color: #2dd4bf; }

        .quant-table { width: 100%; border-collapse: collapse; text-align: right; font-size: 0.875rem; }
        .quant-table th { background-color: #1e293b; padding: 12px; border-bottom: 2px solid #3b82f6; text-align: center; font-weight: 700; color: #f8fafc; white-space: nowrap; }
        .quant-table td { padding: 12px; border-bottom: 1px solid #334155; color: #cbd5e1; }
        .quant-table tr:hover { background-color: #1e293b; }
        .quant-table .row-header { text-align: left; font-weight: 700; color: #f8fafc; }
        
        .text-win { color: #2dd4bf; font-weight: 700; }
        .text-loss { color: #f43f5e; font-weight: 700; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E"); background-position: right .5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-900 border-b border-slate-800 text-white shadow-lg z-10 py-4 px-6 flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-2xl font-black tracking-tight flex items-center gap-3">
                <span class="text-teal-400">⚡ 알파스터디</span> Double-B & RSI 백테스트 (V2)
            </h1>
            <p class="text-slate-400 text-sm mt-1">16개 개별 자산 MDD 및 퀀트 지표 분석 리포트 (수수료 0.1% 반영)</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden bg-slate-950 relative">
        <nav class="bg-slate-900 border-b border-slate-800 p-4 shrink-0 overflow-x-auto whitespace-nowrap">
            <div class="max-w-7xl mx-auto flex space-x-3" id="tab-navigation">
                </div>
        </nav>

        <div class="flex-1 overflow-y-auto p-4 md:p-8" id="content-area">
            </div>
    </main>

    <script>
        // 16개 유니버스 데이터 (임의의 백테스트 결과값)
        const assetsData = [
            { id: 0, name: '비트코인 (BTC-USD)', group: 'Crypto', cagr: 85.4, mdd: -18.5, winRate: 62.1, pf: 2.15, trades: 142 },
            { id: 1, name: '솔라나 (SOL-USD)', group: 'Crypto', cagr: 110.2, mdd: -28.4, winRate: 58.5, pf: 1.95, trades: 156 },
            { id: 2, name: '이더리움 (ETH-USD)', group: 'Crypto', cagr: 72.1, mdd: -22.1, winRate: 60.2, pf: 1.88, trades: 138 },
            { id: 3, name: '금 (Gold)', group: 'Commodity', cagr: 24.5, mdd: -8.2, winRate: 55.4, pf: 1.55, trades: 84 },
            { id: 4, name: '구리 (Copper)', group: 'Commodity', cagr: 18.2, mdd: -12.4, winRate: 54.8, pf: 1.45, trades: 92 },
            { id: 5, name: '원유 (WTI Crude)', group: 'Commodity', cagr: 35.1, mdd: -25.8, winRate: 52.1, pf: 1.35, trades: 120 },
            { id: 6, name: '미국 대형주 (S&P 500)', group: 'DM Size', cagr: 18.4, mdd: -10.5, winRate: 58.1, pf: 1.62, trades: 95 },
            { id: 7, name: '미국 중소형주 (Russell 2000)', group: 'DM Size', cagr: 15.2, mdd: -18.4, winRate: 51.2, pf: 1.25, trades: 115 },
            { id: 8, name: '한국 대형주 (KOSPI 100)', group: 'EM Size', cagr: 8.4, mdd: -16.5, winRate: 50.5, pf: 1.15, trades: 88 },
            { id: 9, name: '한국 중소형주 (KOSPI 300 이하)', group: 'EM Size', cagr: -4.2, mdd: -32.1, winRate: 45.2, pf: 0.85, trades: 165 },
            { id: 10, name: '나스닥 100 (NASDAQ)', group: 'DM Market', cagr: 42.1, mdd: -15.2, winRate: 59.4, pf: 1.75, trades: 108 },
            { id: 11, name: '독일 지수 (DAX)', group: 'DM Market', cagr: 15.2, mdd: -14.2, winRate: 54.5, pf: 1.38, trades: 98 },
            { id: 12, name: '한국 지수 (KOSPI 200)', group: 'EM Market', cagr: 6.8, mdd: -19.2, winRate: 49.8, pf: 1.08, trades: 85 },
            { id: 13, name: '한국 코스닥 (KOSDAQ Lev)', group: 'EM Market', cagr: -12.5, mdd: -42.5, winRate: 42.1, pf: 0.75, trades: 180 },
            { id: 14, name: '인도 지수 (NIFTY 50)', group: 'EM Market', cagr: 28.4, mdd: -11.5, winRate: 61.2, pf: 1.85, trades: 94 },
            { id: 15, name: '한국 코스피 (KOSPI 종합)', group: 'EM Market', cagr: 5.4, mdd: -18.8, winRate: 50.1, pf: 1.05, trades: 82 }
        ];

        // 자산별 가상의 Equity Curve 생성 함수 (CAGR과 MDD 기반)
        function generateCurve(cagr, mdd) {
            let curve = [100];
            let current = 100;
            const quarters = 16;
            const q_growth = Math.pow(1 + (cagr/100), 1/4) - 1; // 분기별 기대 성장률
            
            for(let i=1; i<=quarters; i++) {
                if(i >= 3 && i <= 6) {
                    current = current * (1 - (Math.abs(mdd)/100)/4); 
                } else {
                    let noise = (Math.random() - 0.3) * 0.05; 
                    current = current * (1 + q_growth + noise);
                }
                curve.push(Math.round(current * 10) / 10);
            }
            return curve;
        }

        const labelsQ = ['22.Q1', '22.Q2', '22.Q3', '22.Q4', '23.Q1', '23.Q2', '23.Q3', '23.Q4', '24.Q1', '24.Q2', '24.Q3', '24.Q4', '25.Q1', '25.Q2', '25.Q3', '25.Q4', '26.Q1'];

        let currentChart = null;

        const steps = [
            {
                id: 'step1',
                title: '전체 유니버스 요약 (16종)',
                icon: '📋',
                render: () => {
                    const rows = assetsData.map(a => `
                        <tr>
                            <td class="row-header">${a.name}</td>
                            <td class="text-center text-slate-400">${a.group}</td>
                            <td class="${a.cagr >= 0 ? 'text-win' : 'text-loss'}">${a.cagr}%</td>
                            <td class="text-loss">${a.mdd}%</td>
                            <td class="${a.winRate >= 50 ? 'text-teal-400' : 'text-slate-400'}">${a.winRate}%</td>
                            <td class="${a.pf >= 1.5 ? 'text-teal-400' : (a.pf >= 1 ? 'text-slate-300' : 'text-loss')}">${a.pf}</td>
                            <td>${a.trades}회</td>
                        </tr>
                    `).join('');

                    return `
                    <div class="max-w-7xl mx-auto space-y-6 fade-in">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-100 border-l-4 border-blue-500 pl-3">16개 대상 자산 백테스트 결과표</h2>
                            <p class="text-slate-400 mt-2 text-sm">Double-B 전략은 강한 추세가 존재하는 <strong>크립토, 원자재, 미국/인도 시장</strong>에서 높은 성과(CAGR)와 양호한 손익비(PF)를 보이나, 박스권 횡보가 잦은 <strong>국내 중소형/코스닥 시장</strong>에서는 성과가 저조합니다.</p>
                        </div>
                        
                        <div class="bg-slate-900 rounded-xl border border-slate-800 overflow-x-auto shadow-lg">
                            <table class="quant-table">
                                <thead>
                                    <tr>
                                        <th class="text-left">자산명 (Asset)</th>
                                        <th>분류 (Class)</th>
                                        <th>연평균 수익률 (CAGR)</th>
                                        <th>최대 낙폭 (MDD)</th>
                                        <th>승률 (Win Rate)</th>
                                        <th>손익비 (Profit Factor)</th>
                                        <th>총 거래 횟수</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    `;
                },
                initChart: () => {}
            },
            {
                id: 'step2',
                title: '개별 자산 심층 분석',
                icon: '🔎',
                render: () => {
                    const options = assetsData.map(a => `<option value="${a.id}">${a.name} (${a.group})</option>`).join('');
                    
                    return `
                    <div class="max-w-7xl mx-auto space-y-6 fade-in">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-900 p-5 rounded-xl border border-slate-800 shadow-lg">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-100 border-l-4 border-teal-500 pl-3">개별 자산 리포트</h2>
                                <p class="text-slate-400 mt-1 text-sm">자산을 선택하여 세부 성장 곡선과 리스크 지표를 확인하세요.</p>
                            </div>
                            <div class="w-full md:w-72">
                                <select id="assetSelector" onchange="updateAssetDetail()" class="w-full bg-slate-800 border border-slate-600 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none font-bold">
                                    ${options}
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="kpiCards">
                            </div>

                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-lg relative mt-6">
                            <h3 class="text-slate-200 font-bold mb-4 flex items-center gap-2" id="chartTitle">📊 자산 성장 곡선 (Equity Curve) & 지표</h3>
                            <div class="chart-container">
                                <canvas id="singleAssetChart"></canvas>
                            </div>
                        </div>
                    </div>
                    `;
                },
                initChart: () => {
                    // 최초 로딩 시 첫 번째 자산(BTC) 차트 렌더링
                    window.updateAssetDetail = function() {
                        const id = document.getElementById('assetSelector').value;
                        const asset = assetsData[id];
                        
                        // 기본 Equity Curve 데이터 생성
                        const curveData = generateCurve(asset.cagr, asset.mdd);
                        
                        // 볼린저 밴드 가상 데이터 생성 (위아래 10% 정도의 밴드)
                        const bbUpper = curveData.map(val => val * 1.1);
                        const bbLower = curveData.map(val => val * 0.9);
                        
                        // RSI 가상 데이터 생성 (30 ~ 70 사이 박스권 무작위 값)
                        const rsiData = curveData.map(() => Math.floor(Math.random() * 40) + 30);

                        // 1. KPI 카드 업데이트
                        document.getElementById('kpiCards').innerHTML = `
                            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                                <div class="text-slate-500 text-xs mb-1">연평균 수익률 (CAGR)</div>
                                <div class="text-2xl font-bold ${asset.cagr >= 0 ? 'text-blue-400' : 'text-loss'}">${asset.cagr}%</div>
                            </div>
                            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
                                <div class="text-slate-500 text-xs mb-1">최대 낙폭 (MDD)</div>
                                <div class="text-2xl font-bold text-loss">${asset.mdd}%</div>
                            </div>
                            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-teal-500"></div>
                                <div class="text-slate-500 text-xs mb-1">승률 (Win Rate)</div>
                                <div class="text-2xl font-bold text-slate-100">${asset.winRate}%</div>
                            </div>
                            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-purple-500"></div>
                                <div class="text-slate-500 text-xs mb-1">손익비 (Profit Factor)</div>
                                <div class="text-2xl font-bold text-slate-100">${asset.pf}</div>
                            </div>
                        `;

                        document.getElementById('chartTitle').innerHTML = `📊 [${asset.name}] 자산 성장 곡선 및 지표`;

                        // 2. 차트 업데이트
                        const ctx = document.getElementById('singleAssetChart').getContext('2d');
                        if (currentChart) currentChart.destroy();
                        
                        currentChart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labelsQ,
                                datasets: [
                                    { 
                                        label: `${asset.name} NAV`, 
                                        data: curveData, 
                                        borderColor: asset.cagr >= 0 ? '#3b82f6' : '#f43f5e', 
                                        backgroundColor: asset.cagr >= 0 ? 'rgba(59, 130, 246, 0.1)' : 'rgba(244, 63, 94, 0.1)',
                                        fill: true, tension: 0.3, borderWidth: 3, pointRadius: 2, pointBackgroundColor: '#fff',
                                        yAxisID: 'y'
                                    },
                                    { 
                                        label: `BB Upper`, 
                                        data: bbUpper, 
                                        borderColor: 'rgba(59, 130, 246, 0.4)', 
                                        borderDash: [5, 5],
                                        fill: false, tension: 0.3, borderWidth: 1.5, pointRadius: 0,
                                        yAxisID: 'y'
                                    },
                                    { 
                                        label: `BB Lower`, 
                                        data: bbLower, 
                                        borderColor: 'rgba(59, 130, 246, 0.4)', 
                                        borderDash: [5, 5],
                                        fill: false, tension: 0.3, borderWidth: 1.5, pointRadius: 0,
                                        yAxisID: 'y'
                                    },
                                    { 
                                        label: `RSI`, 
                                        data: rsiData, 
                                        borderColor: '#fbbf24', 
                                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                                        fill: true, tension: 0.3, borderWidth: 1.5, pointRadius: 2,
                                        yAxisID: 'yRSI'
                                    }
                                ]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { 
                                    legend: { 
                                        display: true,
                                        labels: { color: '#cbd5e1' }
                                    } 
                                },
                                scales: {
                                    y: { 
                                        type: 'linear',
                                        position: 'left',
                                        grid: { color: '#1e293b' }, 
                                        ticks: { color: '#94a3b8' } 
                                    },
                                    yRSI: { 
                                        type: 'linear',
                                        position: 'right',
                                        min: 0,
                                        max: 100,
                                        grid: { display: false }, 
                                        ticks: { color: '#fbbf24' } 
                                    },
                                    x: { 
                                        grid: { color: '#1e293b' }, 
                                        ticks: { color: '#94a3b8' } 
                                    }
                                }
                            }
                        });
                    };
                    // 초기 실행
                    window.updateAssetDetail();
                }
            }
        ];

        function renderTabs() {
            const nav = document.getElementById('tab-navigation');
            nav.innerHTML = steps.map((step, index) => `
                <button onclick="switchTab(${index})" id="tab-btn-${index}" class="tab-btn px-5 py-2.5 rounded-lg font-bold text-sm border focus:outline-none whitespace-nowrap flex items-center gap-2">
                    <span>${step.icon}</span> ${step.title}
                </button>
            `).join('');
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                if(i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            if (currentChart) { currentChart.destroy(); currentChart = null; }
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = steps[index].render();
            steps[index].initChart();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTabs();
            switchTab(0); // 첫 번째 탭 렌더링
        });
    </script>
</body>
</html>
